<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — DealZone</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,107,0,0.07) 0%, transparent 65%);
      pointer-events: none;
    }
    .auth-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }
    .auth-logo {
      text-align: center;
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 32px;
      letter-spacing: -0.04em;
    }
    .auth-logo span { color: var(--accent); }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: var(--shadow-card);
    }
    .auth-tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-muted);
    }
    .auth-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 10px rgba(255,107,0,0.3);
    }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: 4px 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .method-toggle {
      display: flex;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .method-btn {
      flex: 1;
      padding: 9px 12px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-muted);
    }
    .method-btn.active { background: rgba(255,107,0,0.12); color: var(--accent); }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); font-weight: 600; }
    .phone-prefix-wrap { position: relative; }
    .phone-prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; pointer-events: none; }
    .phone-input { padding-left: 52px !important; }
    .input-error { color: var(--error); font-size: 0.8rem; margin-top: -8px; }
    .submit-btn { margin-top: 4px; }
    .loading-text { display: none; }
    .btn-loading .loading-text { display: inline; }
    .btn-loading .normal-text { display: none; }
  </style>
</head>
<body>

<!-- Page Loader -->
<div id="page-loader">
  <div class="loader-logo">Deal<span>Zone</span></div>
  <div class="spinner"></div>
</div>

<div class="auth-wrap">
  <div class="auth-logo">Deal<span>Zone</span></div>

  <div class="auth-card">
    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- Method Toggle -->
    <div class="method-toggle" style="margin-bottom:20px;">
      <div class="method-btn active" id="method-email" onclick="switchMethod('email')">📧 Email</div>
      <div class="method-btn" id="method-phone" onclick="switchMethod('phone')">📱 Phone</div>
    </div>

    <!-- Login Form -->
    <div id="form-login">
      <div class="auth-form">
        <!-- Email fields -->
        <div id="login-email-fields">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="login-email" class="form-input" placeholder="you@example.com" />
          </div>
          <div class="form-group" style="margin-top:12px;">
            <label class="form-label">Password</label>
            <input type="password" id="login-password" class="form-input" placeholder="Enter your password" />
          </div>
        </div>
        <!-- Phone fields -->
        <div id="login-phone-fields" style="display:none;">
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <div class="phone-prefix-wrap">
              <span class="phone-prefix">+880</span>
              <input type="tel" id="login-phone" class="form-input phone-input" placeholder="17XXXXXXXX" maxlength="10" />
            </div>
          </div>
          <div class="form-group" style="margin-top:12px;">
            <label class="form-label">Password</label>
            <input type="password" id="login-phone-password" class="form-input" placeholder="Enter your password" />
          </div>
        </div>
        <div id="login-error" class="input-error" style="display:none;"></div>
        <button class="btn btn-primary btn-full submit-btn" id="btn-login" onclick="handleLogin()">
          <span class="normal-text">Login to Account</span>
          <span class="loading-text">Logging in...</span>
        </button>
      </div>
    </div>

    <!-- Signup Form -->
    <div id="form-signup" style="display:none;">
      <div class="auth-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="signup-name" class="form-input" placeholder="Your full name" />
        </div>
        <!-- Email fields -->
        <div id="signup-email-fields">
          <div class="form-group" style="margin-top:12px;">
            <label class="form-label">Email Address</label>
            <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" />
          </div>
        </div>
        <!-- Phone fields -->
        <div id="signup-phone-fields" style="display:none;">
          <div class="form-group" style="margin-top:12px;">
            <label class="form-label">Phone Number</label>
            <div class="phone-prefix-wrap">
              <span class="phone-prefix">+880</span>
              <input type="tel" id="signup-phone" class="form-input phone-input" placeholder="17XXXXXXXX" maxlength="10" />
            </div>
          </div>
        </div>
        <div class="form-group" style="margin-top:12px;">
          <label class="form-label">Password</label>
          <input type="password" id="signup-password" class="form-input" placeholder="Min. 6 characters" />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="signup-confirm" class="form-input" placeholder="Repeat password" />
        </div>
        <div id="signup-error" class="input-error" style="display:none;"></div>
        <button class="btn btn-primary btn-full submit-btn" id="btn-signup" onclick="handleSignup()">
          <span class="normal-text">Create Account</span>
          <span class="loading-text">Creating account...</span>
        </button>
      </div>
    </div>

    <div class="auth-footer">
      By continuing, you agree to our <a href="#">Terms of Service</a>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⚠️ REPLACE WITH YOUR CONFIG
  const firebaseConfig = {
  apiKey: "AIzaSyClg_colIw3qLzE3DefSeEJP98i37kI-dI",
  authDomain: "rivate-offer-share.firebaseapp.com",
  projectId: "rivate-offer-share",
  storageBucket: "rivate-offer-share.firebasestorage.app",
  messagingSenderId: "485885612132",
  appId: "1:485885612132:web:cefc9d9b88c0dc01544f71",
  measurementId: "G-KWNSXRW4CB"
};
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // Redirect if already logged in
  onAuthStateChanged(auth, user => {
    hideLoader();
    if (user) window.location.href = 'index.html';
  });

  // Expose auth to window for button handlers
  window._auth = auth;
  window._db   = db;
  window._firebaseFns = { signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, doc, setDoc, serverTimestamp };

  function hideLoader() {
    const l = document.getElementById('page-loader');
    if (l) { l.classList.add('fade-out'); setTimeout(() => l.remove(), 400); }
  }
</script>

<script>
  let currentTab   = 'login';
  let currentMethod = 'email';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('form-login').style.display  = tab === 'login'  ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    clearErrors();
  }

  function switchMethod(method) {
    currentMethod = method;
    document.getElementById('method-email').classList.toggle('active', method === 'email');
    document.getElementById('method-phone').classList.toggle('active', method === 'phone');
    // Toggle login fields
    document.getElementById('login-email-fields').style.display  = method === 'email' ? 'block' : 'none';
    document.getElementById('login-phone-fields').style.display  = method === 'phone' ? 'block' : 'none';
    // Toggle signup fields
    document.getElementById('signup-email-fields').style.display = method === 'email' ? 'block' : 'none';
    document.getElementById('signup-phone-fields').style.display = method === 'phone' ? 'block' : 'none';
    clearErrors();
  }

  function clearErrors() {
    ['login-error','signup-error'].forEach(id => {
      const el = document.getElementById(id);
      el.style.display = 'none'; el.textContent = '';
    });
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
  }

  function setLoading(btnId, state) {
    const btn = document.getElementById(btnId);
    btn.disabled = state;
    btn.classList.toggle('btn-loading', state);
  }

  function showToast(msg, type = 'info') {
    const wrap = document.getElementById('toast');
    const item = document.createElement('div');
    item.className = `toast-item ${type}`;
    item.textContent = msg;
    wrap.appendChild(item);
    setTimeout(() => {
      item.style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => item.remove(), 300);
    }, 3500);
  }

  // Phone number → fake email
  function phoneToEmail(phone) {
    const digits = phone.replace(/\D/g, '');
    return `ph${digits}@dealzone.app`;
  }

  async function handleLogin() {
    clearErrors();
    setLoading('btn-login', true);
    try {
      let email, password;
      if (currentMethod === 'email') {
        email    = document.getElementById('login-email').value.trim();
        password = document.getElementById('login-password').value;
        if (!email || !password) { showError('login-error', 'Please fill in all fields.'); return; }
      } else {
        const phone = document.getElementById('login-phone').value.trim();
        password     = document.getElementById('login-phone-password').value;
        if (!phone || !password) { showError('login-error', 'Please fill in all fields.'); return; }
        email = phoneToEmail(phone);
      }
      await window._firebaseFns.signInWithEmailAndPassword(window._auth, email, password);
      showToast('Login successful!', 'success');
      setTimeout(() => window.location.href = 'index.html', 800);
    } catch (err) {
      const msg = parseFirebaseError(err.code);
      showError('login-error', msg);
    } finally {
      setLoading('btn-login', false);
    }
  }

  async function handleSignup() {
    clearErrors();
    const name     = document.getElementById('signup-name').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm  = document.getElementById('signup-confirm').value;

    if (!name) { showError('signup-error', 'Please enter your name.'); return; }
    if (password.length < 6) { showError('signup-error', 'Password must be at least 6 characters.'); return; }
    if (password !== confirm) { showError('signup-error', 'Passwords do not match.'); return; }

    let email;
    if (currentMethod === 'email') {
      email = document.getElementById('signup-email').value.trim();
      if (!email) { showError('signup-error', 'Please enter your email.'); return; }
    } else {
      const phone = document.getElementById('signup-phone').value.trim();
      if (!phone || phone.length < 9) { showError('signup-error', 'Please enter a valid phone number.'); return; }
      email = phoneToEmail(phone);
    }

    setLoading('btn-signup', true);
    try {
      const { user } = await window._firebaseFns.createUserWithEmailAndPassword(window._auth, email, password);
      await window._firebaseFns.updateProfile(user, { displayName: name });
      // Save user to Firestore
      await window._firebaseFns.setDoc(
        window._firebaseFns.doc(window._db, 'users', user.uid),
        { name, email, uid: user.uid, method: currentMethod, createdAt: window._firebaseFns.serverTimestamp() }
      );
      showToast('Account created!', 'success');
      setTimeout(() => window.location.href = 'index.html', 800);
    } catch (err) {
      showError('signup-error', parseFirebaseError(err.code));
    } finally {
      setLoading('btn-signup', false);
    }
  }

  function parseFirebaseError(code) {
    const map = {
      'auth/user-not-found':       'No account found with these credentials.',
      'auth/wrong-password':       'Incorrect password. Please try again.',
      'auth/email-already-in-use': 'This email/phone is already registered.',
      'auth/invalid-email':        'Invalid email address.',
      'auth/weak-password':        'Password is too weak.',
      'auth/too-many-requests':    'Too many attempts. Please try again later.',
      'auth/network-request-failed': 'Network error. Check your connection.',
      'auth/invalid-credential':   'Invalid credentials. Please check and retry.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (currentTab === 'login') handleLogin();
      else handleSignup();
    }
  });
</script>
</body>
</html>
